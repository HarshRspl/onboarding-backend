# ═══════════════════════════════════════════════════════════════
# RSPL ONBOARDING - DEV CONFIGURATION
# ═══════════════════════════════════════════════════════════════

# ── Server ────────────────────────────────────────────────────
server.port=8080
server.error.include-message=always

# ── MySQL Dev (Codespaces/GitHub) ─────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/rspl_onboarding?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Schema & Data Auto-Load ───────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# ── HikariCP Connection Pool ──────────────────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# ── Email (Use Mailtrap for testing - free) ───────────────────
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=demo@yourdomain.com
spring.mail.password=your-mailtrap-password-here
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── App URLs (Codespaces) ─────────────────────────────────────
app.base-url=http://localhost:8080
app.frontend-url=http://localhost:5173
app.onboarding-link-base=http://localhost:5173/onboarding

# ── Logging ───────────────────────────────────────────────────
logging.level.com.rspl.onboarding=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG
